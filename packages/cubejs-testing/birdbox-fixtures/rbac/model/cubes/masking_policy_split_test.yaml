cubes:
  - name: masking_policy_split_test
    sql: |
      SELECT * FROM (VALUES
        (1, 'RESEARCH', 1, '100 Main St'),
        (2, 'DEMO', 1, '200 Main St'),
        (3, 'LATAM', 0, '300 Main St'),
        (4, 'APAC', 1, '400 Main St'),
        (5, 'EMEA', 1, '500 Main St'),
        (6, 'LATAM', 1, '600 Main St')
      ) AS src(id, data_security_field, region_lock_data, address_line_1)

    dimensions:
      - name: id
        sql: id
        type: number
        primary_key: true

      - name: data_security_field
        sql: data_security_field
        type: string
        public: false

      - name: region_lock_data
        sql: region_lock_data
        type: number
        public: false

      - name: address_line_1
        sql: address_line_1
        type: string
        mask:
          sql: |
            CASE
              WHEN {CUBE}.data_security_field IN ('RESEARCH', 'DEMO') THEN {CUBE}.address_line_1
              WHEN '{ security_context.access_group }' = 'Sensitive Data Access'
                   AND {CUBE}.region_lock_data = 0 THEN {CUBE}.address_line_1
              WHEN {CUBE}.data_security_field = '{ security_context.data_region }'
                THEN {CUBE}.address_line_1
              ELSE '***MASKED***'
            END

    access_policy:
      - group: "Sensitive Data Access"
        member_level:
          excludes:
            - address_line_1
        member_masking:
          includes:
            - address_line_1
        row_level:
          allow_all: true

      - group: "Very Sensitive Data Access"
        member_level:
          excludes:
            - address_line_1
        member_masking:
          includes:
            - address_line_1
        row_level:
          allow_all: true
