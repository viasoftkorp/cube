cubes:
  - name: masking_test
    sql_table: public.line_items

    dimensions:
      - name: id
        sql: id
        type: number
        primary_key: true

      - name: secret_string
        sql: product_id
        mask:
          sql: "CONCAT('***', RIGHT(CAST({CUBE}.product_id AS TEXT), 2))"
        type: string

      - name: secret_number
        sql: price
        mask: -1
        type: number

      - name: secret_boolean
        sql: "CASE WHEN {CUBE}.quantity > 3 THEN TRUE ELSE FALSE END"
        mask: FALSE
        type: boolean

      - name: public_dim
        sql: order_id
        type: number

    measures:
      - name: count
        mask: 12345
        type: count

      - name: count_d
        sql: product_id
        mask: 34567
        type: count_distinct

      - name: total_quantity
        sql: quantity
        type: sum

    access_policy:
      - role: "*"
        member_level:
          includes: []
        member_masking:
          includes: "*"

      - role: "masking_full_access"
        member_level:
          includes: "*"
        row_level:
          allow_all: true

      - role: "masking_partial"
        member_level:
          includes:
            - id
            - public_dim
            - total_quantity
        member_masking:
          includes: "*"
        row_level:
          allow_all: true

  # Cube where all members are hidden by policy.
  # Members carry mask definitions so a view can apply masking on top.
  - name: masking_hidden_cube
    sql_table: public.line_items

    dimensions:
      - name: id
        sql: id
        type: number
        primary_key: true

      - name: secret_string
        sql: product_id
        mask:
          sql: "CONCAT('***', RIGHT(CAST({CUBE}.product_id AS TEXT), 2))"
        type: string

      - name: secret_number
        sql: price
        mask: -1
        type: number

      - name: public_dim
        sql: order_id
        type: number

    measures:
      - name: count
        mask: 12345
        type: count

      - name: total_quantity
        sql: quantity
        type: sum

    access_policy:
      - role: "*"
        member_level:
          includes: []

  # Cube for testing split masking policies:
  # - additional row-level policies with masking disabled (member_level includes "*")
  # - complementary fallback policies with masking enabled (member_masking)
  - name: masking_policy_split_test
    sql: |
      SELECT * FROM (VALUES
        (1, 'RESEARCH', 1, '100 Main St'),
        (2, 'DEMO', 1, '200 Main St'),
        (3, 'LATAM', 0, '300 Main St'),
        (4, 'APAC', 1, '400 Main St'),
        (5, 'EMEA', 1, '500 Main St'),
        (6, 'LATAM', 1, '600 Main St')
      ) AS src(id, data_security_field, region_lock_data, address_line_1)

    dimensions:
      - name: id
        sql: id
        type: number
        primary_key: true

      - name: data_security_field
        sql: data_security_field
        type: string
        public: false

      - name: region_lock_data
        sql: region_lock_data
        type: number
        public: false

      - name: address_line_1
        sql: address_line_1
        type: string
        mask:
          sql: "'***MASKED***'"

    access_policy:
      # Shared unmask policy: RESEARCH / DEMO -> real values
      - groups: ["Sensitive Data Access", "Very Sensitive Data Access"]
        member_level:
          includes: "*"
        row_level:
          filters:
            - or:
              - member: data_security_field
                operator: equals
                values: ["RESEARCH"]
              - member: data_security_field
                operator: equals
                values: ["DEMO"]

      # Sensitive-only additional unmask policy: region_lock_data = 0
      - group: "Sensitive Data Access"
        member_level:
          includes: "*"
        row_level:
          filters:
            - member: region_lock_data
              operator: equals
              values: ["0"]

      # Sensitive-only additional unmask policy: data_security_field = user data_region
      - group: "Sensitive Data Access"
        member_level:
          includes: "*"
        row_level:
          filters:
            - member: data_security_field
              operator: equals
              values: ["{ security_context.auth.userAttributes.data_region }"]

      # Sensitive fallback policy: complementary rows are masked
      - group: "Sensitive Data Access"
        member_level:
          excludes:
            - address_line_1
        member_masking:
          includes:
            - address_line_1
        row_level:
          filters:
            - and:
              - member: data_security_field
                operator: notEquals
                values: ["RESEARCH"]
              - member: data_security_field
                operator: notEquals
                values: ["DEMO"]
              - member: region_lock_data
                operator: notEquals
                values: ["0"]
              - member: data_security_field
                operator: notEquals
                values: ["{ security_context.auth.userAttributes.data_region }"]

      # Very Sensitive additional unmask policy: data_security_field = user data_region
      - group: "Very Sensitive Data Access"
        member_level:
          includes: "*"
        row_level:
          filters:
            - member: data_security_field
              operator: equals
              values: ["{ security_context.auth.userAttributes.data_region }"]

      # Very Sensitive fallback policy: complementary rows are masked
      - group: "Very Sensitive Data Access"
        member_level:
          excludes:
            - address_line_1
        member_masking:
          includes:
            - address_line_1
        row_level:
          filters:
            - and:
              - member: data_security_field
                operator: notEquals
                values: ["RESEARCH"]
              - member: data_security_field
                operator: notEquals
                values: ["DEMO"]
              - member: data_security_field
                operator: notEquals
                values: ["{ security_context.auth.userAttributes.data_region }"]

views:
  # View with full access at view level - but cube masking still applies (RLS pattern)
  # Excludes members with {CUBE} references in SQL (secret_string, secret_boolean)
  - name: masking_view
    cubes:
      - join_path: masking_test
        includes:
          - secret_number
          - public_dim
          - count
          - count_d
          - total_quantity
    access_policy:
      - role: "*"
        member_level:
          includes: "*"
        row_level:
          allow_all: true

  # View with its own masking policy: all members masked for "*", full access for masking_full_access
  # Excludes secret_string (SQL mask with {CUBE} references causes FROM-clause issues in SQL API)
  - name: masking_view_masked
    cubes:
      - join_path: masking_test
        includes:
          - secret_number
          - public_dim
          - count
          - count_d
          - total_quantity
    access_policy:
      - role: "*"
        member_level:
          includes: []
        member_masking:
          includes: "*"
        row_level:
          allow_all: true
      - role: "masking_full_access"
        member_level:
          includes: "*"
        row_level:
          allow_all: true

  # View with partial masking: public_dim and total_quantity unmasked, rest masked
  # Excludes members with {CUBE} references in SQL (secret_string, secret_boolean)
  - name: masking_view_partial
    cubes:
      - join_path: masking_test
        includes:
          - secret_number
          - public_dim
          - count
          - count_d
          - total_quantity
    access_policy:
      - role: "*"
        member_level:
          includes:
            - public_dim
            - total_quantity
        member_masking:
          includes: "*"
        row_level:
          allow_all: true

  # View over a cube where all members are hidden.
  # The view adds its own masking policy — members that are invisible at
  # the cube level become accessible (some masked, some real) through the view.
  # Excludes secret_string (SQL mask with {CUBE} references causes FROM-clause issues in SQL API)
  - name: masking_view_over_hidden_cube
    cubes:
      - join_path: masking_hidden_cube
        includes:
          - secret_number
          - public_dim
          - count
          - total_quantity
    access_policy:
      - role: "*"
        member_level:
          includes:
            - public_dim
            - total_quantity
        member_masking:
          includes: "*"
        row_level:
          allow_all: true
      - role: "masking_full_access"
        member_level:
          includes: "*"
        row_level:
          allow_all: true
